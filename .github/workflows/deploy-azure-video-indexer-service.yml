# Deploy azure-video-indexer-service to Azure Container Apps
#
# Required GitHub Secrets
#   AZURE_CLIENT_ID             OIDC app registration client ID.
#   AZURE_TENANT_ID             OIDC tenant ID.
#   AZURE_SUBSCRIPTION_ID       Subscription used for the deployment.
#   AZURE_VIDEO_INDEXER_API_KEY Service-specific API key injected into the container app.
#
# Required GitHub Variables
#   AZURE_RESOURCE_GROUP                Target resource group for the new service stack.
#   AZURE_LOCATION                      Azure region for the deployment.
#   AZURE_CONTAINER_APPS_ENV            Existing Container Apps environment name.
#   ACR_NAME                            Optional Azure Container Registry name; defaults to acrvideostudio.
#   FOUNDRY_ACCOUNT_NAME               Azure AI Foundry / Azure OpenAI account name.
#   FOUNDRY_PROJECT_NAME               Optional Foundry project name; defaults to video-indexer-project.
#   VIDEO_INDEXER_ACCOUNT_NAME          Optional Azure AI Video Indexer account name; defaults to videoindexer-prod.
#   VIDEO_INDEXER_ROLE_DEFINITION_RESOURCE_ID Optional override; otherwise resolved after Azure Login.
#   The Durable Task Data Contributor built-in role is assigned by Bicep; no role ID variable is required.
#
# Deployment principal requirements
#   Contributor on the target resource group.
#   User Access Administrator (or Owner) on the scopes where infra/main.bicep creates role assignments.

name: Deploy azure-video-indexer-service

on:
  push:
    branches:
      - main
    paths:
      - 'azure-video-indexer-service/**'
      - 'internal/**'
      - 'go.mod'
      - 'go.sum'
      - 'infra/**'
      - 'azure.yaml'
      - '.github/workflows/deploy-azure-video-indexer-service.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-azure-video-indexer-service-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    environment: production

    env:
      AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
      AZURE_CONTAINER_APPS_ENV: ${{ vars.AZURE_CONTAINER_APPS_ENV }}
      ACR_NAME: ${{ vars.ACR_NAME || 'acrvideostudio' }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      FOUNDRY_ACCOUNT_NAME: ${{ vars.FOUNDRY_ACCOUNT_NAME }}
      FOUNDRY_PROJECT_NAME: ${{ vars.FOUNDRY_PROJECT_NAME || 'video-indexer-project' }}
      VIDEO_INDEXER_ACCOUNT_NAME: ${{ vars.VIDEO_INDEXER_ACCOUNT_NAME || 'videoindexer-prod' }}
      VIDEO_INDEXER_ROLE_DEFINITION_RESOURCE_ID: ${{ vars.VIDEO_INDEXER_ROLE_DEFINITION_RESOURCE_ID }}
      VIDEO_INDEXER_API_KEY: ${{ secrets.AZURE_VIDEO_INDEXER_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deployment inputs
        run: |
          set -euo pipefail
          for name in \
            AZURE_RESOURCE_GROUP \
            AZURE_LOCATION \
            AZURE_CONTAINER_APPS_ENV \
            AZURE_SUBSCRIPTION_ID \
            FOUNDRY_ACCOUNT_NAME \
            VIDEO_INDEXER_API_KEY
          do
            if [ -z "${!name:-}" ]; then
              echo "Missing required deployment input: $name" >&2
              exit 1
            fi
          done

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: azure-video-indexer-service/go.mod
          cache-dependency-path: azure-video-indexer-service/go.sum

      - name: Install Wails Linux test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            libgtk-4-dev \
            libwebkitgtk-6.0-dev \
            libglib2.0-dev \
            libsoup-3.0-dev

      - name: Build embedded frontend assets
        run: |
          npm ci --prefix frontend
          npm run build --prefix frontend

      - name: Test durable Video Indexer service
        run: go test ./...
        working-directory: azure-video-indexer-service
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Verify Video Indexer resource provider
        run: |
          set -euo pipefail
          registration_state="$(az provider show \
            --namespace Microsoft.VideoIndexer \
            --query registrationState \
            --output tsv)"
          if [ "$registration_state" != "Registered" ]; then
            echo "Microsoft.VideoIndexer is not registered (state: ${registration_state:-unknown})." >&2
            echo "Register it at subscription scope before running this workflow." >&2
            exit 1
          fi

      - name: Resolve Video Indexer role definition
        run: |
          set -euo pipefail
          if [ -n "${VIDEO_INDEXER_ROLE_DEFINITION_RESOURCE_ID:-}" ]; then
            echo "Using the explicitly configured Video Indexer role definition resource ID."
            exit 0
          fi

          target_role_name='Video Indexer Account Contributor'
          mapfile -t role_ids < <(
            az role definition list \
              --custom-role-only false \
              --query "[?roleName=='${target_role_name}'].id" \
              --output tsv
          )
          if [ "${#role_ids[@]}" -eq 0 ] || [ -z "${role_ids[0]}" ]; then
            echo "Required Video Indexer role definition not found: ${target_role_name}." >&2
            az role definition list \
              --custom-role-only false \
              --query "[?contains(roleName, 'Video Indexer')].{name:roleName,id:id}" \
              --output table >&2
            exit 1
          fi
          if [ "${#role_ids[@]}" -ne 1 ]; then
            echo "Expected exactly one '${target_role_name}' role definition, found ${#role_ids[@]}." >&2
            printf '%s\n' "${role_ids[@]}" >&2
            exit 1
          fi
          echo "VIDEO_INDEXER_ROLE_DEFINITION_RESOURCE_ID=${role_ids[0]}" >> "$GITHUB_ENV"

      - name: Install Container Apps CLI extension
        run: |
          az config set extension.use_dynamic_install=yes_without_prompt
          az extension add --name containerapp --upgrade --yes

      - name: Resolve Container Apps environment ID
        run: |
          set -euo pipefail
          env_id="$(az containerapp env show --name "$AZURE_CONTAINER_APPS_ENV" --resource-group "$AZURE_RESOURCE_GROUP" --query id -o tsv)"
          if [ -z "$env_id" ]; then
            echo "Unable to resolve Container Apps environment ID." >&2
            exit 1
          fi
          echo "CONTAINER_APPS_ENVIRONMENT_ID=$env_id" >> "$GITHUB_ENV"

      - name: Provision Azure Container Registry
        run: |
          set -euo pipefail
          az deployment group create \
            --name "bootstrap-container-registry-${GITHUB_RUN_ID}" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --template-file "infra/container-registry.bicep" \
            --parameters location="$AZURE_LOCATION" containerRegistryName="$ACR_NAME" \
            --only-show-errors

      - name: Build and push immutable service image
        run: |
          set -euo pipefail
          az acr build \
            --registry "$ACR_NAME" \
            --image "ai-video-indexer-service:${GITHUB_SHA}" \
            --file "azure-video-indexer-service/Dockerfile" \
            "." \
            --only-show-errors

      - name: Build and push immutable FFmpeg worker image
        run: |
          set -euo pipefail
          az acr build \
            --registry "$ACR_NAME" \
            --image "ffmpeg-render-worker:${GITHUB_SHA}" \
            --file "azure-video-indexer-service/Dockerfile.ffmpeg" \
            "." \
            --only-show-errors

      - name: Validate Bicep deployment
        run: |
          set -euo pipefail
          az deployment group validate \
            --name "validate-azure-video-indexer-service-${GITHUB_RUN_ID}" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --template-file "infra/main.bicep" \
            --parameters \
              location="$AZURE_LOCATION" \
              containerAppsEnvironmentId="$CONTAINER_APPS_ENVIRONMENT_ID" \
              containerRegistryName="$ACR_NAME" \
              foundryAccountName="$FOUNDRY_ACCOUNT_NAME" \
              foundryProjectName="$FOUNDRY_PROJECT_NAME" \
              videoIndexerAccountName="$VIDEO_INDEXER_ACCOUNT_NAME" \
              videoIndexerRoleDefinitionResourceId="$VIDEO_INDEXER_ROLE_DEFINITION_RESOURCE_ID" \
              containerImageTag="$GITHUB_SHA" \
              serviceApiKey="$VIDEO_INDEXER_API_KEY" \
            --only-show-errors
      - name: Deploy infrastructure and service
        run: |
          set -euo pipefail
          fqdn="$(
            az deployment group create \
              --name "deploy-azure-video-indexer-service-${GITHUB_RUN_ID}" \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --template-file "infra/main.bicep" \
              --parameters \
                location="$AZURE_LOCATION" \
                containerAppsEnvironmentId="$CONTAINER_APPS_ENVIRONMENT_ID" \
                containerRegistryName="$ACR_NAME" \
                foundryAccountName="$FOUNDRY_ACCOUNT_NAME" \
                foundryProjectName="$FOUNDRY_PROJECT_NAME" \
                videoIndexerAccountName="$VIDEO_INDEXER_ACCOUNT_NAME" \
                videoIndexerRoleDefinitionResourceId="$VIDEO_INDEXER_ROLE_DEFINITION_RESOURCE_ID" \
                containerImageTag="$GITHUB_SHA" \
                serviceApiKey="$VIDEO_INDEXER_API_KEY" \
              --query properties.outputs.containerAppFqdn.value -o tsv \
              --only-show-errors
          )"
          if [ -z "$fqdn" ]; then
            echo "Deployment completed without a Container App FQDN output." >&2
            exit 1
          fi
          echo "CONTAINER_APP_FQDN=$fqdn" >> "$GITHUB_ENV"

      - name: Smoke test deployment
        run: |
          set -euo pipefail
          url="https://${CONTAINER_APP_FQDN}/ready"
          for attempt in $(seq 1 30); do
            response="$(curl -sS --max-time 10 -w $'\n%{http_code}' "$url")" || true
            body="${response%$'\n'*}"
            code="${response##*$'\n'}"
            if [ "$code" = "200" ] && printf '%s' "$body" | grep -q '"status":"ready"'; then
              exit 0
            fi
            echo "Readiness check attempt ${attempt}/30 failed; retrying." >&2
            sleep 10
          done
          echo "Deployment smoke test failed." >&2
          exit 1
